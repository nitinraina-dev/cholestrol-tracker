name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --non-interactive
        env:
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
          EXPO_PUBLIC_GEMINI_API_KEY_2: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY_2 }}
          EXPO_PUBLIC_GEMINI_API_KEY_3: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY_3 }}

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
          EXPO_PUBLIC_GEMINI_API_KEY_2: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY_2 }}
          EXPO_PUBLIC_GEMINI_API_KEY_3: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY_3 }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cholesterol-tracker-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
